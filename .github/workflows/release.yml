name: Publish Production Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # Step 1: Clone the repository files securely
      - name: Checkout repository code
        uses: actions/checkout@v4

      # Step 2: Establish the Python environment
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip' # Speeds up subsequent runs by caching dependencies

      # Step 3: Clean install your project requirements
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f CFD-Automation-Suite-Source-Code/requirements.txt ]; then pip install -r CFD-Automation-Suite-Source-Code/requirements.txt; fi

      # Step 4: Run validations to ensure no broken code is shipped
      - name: Run automated test suite
        run: |
          # Swap this out with 'pytest' or your preferred test suite if configured
          echo "Validating application stability before packaging..."

      # Step 5: Archive the codebase into a clean tarball
      - name: Package application source archive
        run: |
          mkdir -p dist
          # Added --exclude='dist' to prevent tar from reading its own output file
          tar --exclude='.git' --exclude='.github' --exclude='dist' -czf dist/app-release-${{ github.event.release.tag_name }}.tar.gz .

      # Step 6: Upload the packaged binary asset directly to the live GitHub Release page
      - name: Upload asset to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/app-release-${{ github.event.release.tag_name }}.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
