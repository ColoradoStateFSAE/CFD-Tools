name: Nightly Development Build

on:
  push:
    branches: [ "main" ] # Automatically compiles on every commit to main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # =========================================================================
  # JOB 1: Compile the Windows Installer (.exe) with Metadata
  # =========================================================================
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if (Test-Path requirements.txt) { pip install -r requirements.txt }
          if (Test-Path CFD-Automation-Suite-Source-Code/requirements.txt) { pip install -r CFD-Automation-Suite-Source-Code/requirements.txt }

      # Fetches and registers 'makensis' into the runner's path environment
      - name: Install NSIS Compiler Engine
        uses: negrutiu/nsis-install@v2

      - name: Compile Windows Installer via NSIS
        run: |
          makensis installer.nsi

      # Extracts date/hash inside Windows PowerShell and renames the resulting installer
      - name: Rename Installer with Date and Commit Hash
        shell: powershell
        run: |
          $date = Get-Date -Format "yyyyMMdd"
          $sha = (git rev-parse --short HEAD).Trim()
          mkdir dist-staged
          
          # Locates the compiled setup file from your NSIS build and stamps it
          Get-ChildItem -Path . , dist -Filter *.exe -Recurse | Select-Object -First 1 | ForEach-Object {
              Move-Item $_.FullName "dist-staged/setup-$date-$sha.exe" -Force
          }

      - name: Archive Windows Installer Piece
        uses: actions/upload-artifact@v4
        with:
          name: compiled-windows-exe
          path: dist-staged/*.exe
          retention-days: 1

  # =========================================================================
  # JOB 2: Compile the Rocky Linux Package (.rpm) with Metadata
  # =========================================================================
  build-rocky-linux:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    container:
      image: rockylinux:9

    steps:
      - name: Install Git and Core Build Tools
        run: |
          dnf clean all
          dnf makecache
          dnf install -y git rpm-build rpmdevtools python3.11 python3.11-pip gcc

      - name: Checkout repository code
        uses: actions/checkout@v4

      - name: Install Python dependencies
        run: |
          python3.11 -m pip install --upgrade pip
          if [ -f requirements.txt ]; then python3.11 -m pip install -r requirements.txt; fi
          if [ -f CFD-Automation-Suite-Source-Code/requirements.txt ]; then python3.11 -m pip install -r CFD-Automation-Suite-Source-Code/requirements.txt; fi

      - name: Build Rocky Linux RPM Package
        run: |
          BUILD_DATE=$(date +'%Y%m%d')
          COMMIT_SHA=$(git rev-parse --short HEAD)
          
          rpmdev-setuptree
          mkdir -p /root/rpmbuild/SOURCES
          tar --exclude='.git' --exclude='.github' -czf /root/rpmbuild/SOURCES/cfd-tools-app.tar.gz .
          
          # Writing directly line-by-line avoiding tricky EOF indent blocks
          if [ ! -f cfd-tools.spec ]; then
            echo "Name:           cfd-tools-app" > cfd-tools.spec
            echo "Version:        1.0.0" >> cfd-tools.spec
            echo "Release:        ${BUILD_DATE}git${COMMIT_SHA}%{?dist}" >> cfd-tools.spec
            echo "Summary:        CSU Ram Racing FSAE CFD Automation Suite" >> cfd-tools.spec
            echo "License:        GPLv3" >> cfd-tools.spec
            echo "Source0:        cfd-tools-app.tar.gz" >> cfd-tools.spec
            echo "Requires:       python3.11" >> cfd-tools.spec
            echo "BuildArch:      noarch" >> cfd-tools.spec
            echo "" >> cfd-tools.spec
            echo "%description" >> cfd-tools.spec
            echo "Automated CFD suite tools used by the aerodynamics subteam." >> cfd-tools.spec
            echo "" >> cfd-tools.spec
            echo "%prep" >> cfd-tools.spec
            echo "%setup -q -c" >> cfd-tools.spec
            echo "" >> cfd-tools.spec
            echo "%install" >> cfd-tools.spec
            echo "mkdir -p %{buildroot}/opt/cfd-tools" >> cfd-tools.spec
            echo "cp -r * %{buildroot}/opt/cfd-tools/" >> cfd-tools.spec
            echo "" >> cfd-tools.spec
            echo "%files" >> cfd-tools.spec
            echo "/opt/cfd-tools" >> cfd-tools.spec
            echo "" >> cfd-tools.spec
            echo "%changelog" >> cfd-tools.spec
            echo "* Wed May 27 2026 GitHub Actions <actions@github.com> - 1.0.0" >> cfd-tools.spec
            echo "- Automated build package generation" >> cfd-tools.spec
          fi
          
          rpmbuild -ba cfd-tools.spec
          mkdir -p dist-staged-rpm
          cp /root/rpmbuild/RPMS/*/*.rpm dist-staged-rpm/

      - name: Archive Rocky Linux RPM Piece
        uses: actions/upload-artifact@v4
        with:
          name: compiled-rocky-rpm
          path: dist-staged-rpm/*.rpm
          retention-days: 1

  # =========================================================================
  # JOB 3: Collect Stamped Assets and Publish
  # =========================================================================
  publish-nightly:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [build-windows, build-rocky-linux]

    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      - name: Generate build metadata tags
        id: metadata
        run: |
          echo "BUILD_DATE=$(date +'%Y%m%d')" >> $GITHUB_OUTPUT
          echo "COMMIT_SHA=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Download Windows Compilation Piece
        uses: actions/download-artifact@v4
        with:
          name: compiled-windows-exe
          path: dist-assets

      - name: Download Rocky Linux Compilation Piece
        uses: actions/download-artifact@v4
        with:
          name: compiled-rocky-rpm
          path: dist-assets

      - name: Package application source archive
        run: |
          mkdir -p dist-assets
          tar --exclude='.git' --exclude='.github' --exclude='dist-assets' -czf dist-assets/app-nightly-${{ steps.metadata.outputs.BUILD_DATE }}-${{ steps.metadata.outputs.COMMIT_SHA }}.tar.gz .

      - name: Update Nightly Pre-release Tag
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly-latest
          name: "Nightly Development Build"
          body: |
            ### 🌙 Nightly Development Build
            This release contains the absolute latest, automatically compiled features directly from the `main` branch.
            
            ⚠️ **Please Note:** These builds are developmental works-in-progress and may contain bugs or unstable features.
            
            * **Build Date:** ${{ steps.metadata.outputs.BUILD_DATE }}
            * **Latest Commit:** ${{ steps.metadata.outputs.COMMIT_SHA }}
          prerelease: true
          files: |
            dist-assets/*.tar.gz
            dist-assets/*.exe
            dist-assets/*.rpm
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
