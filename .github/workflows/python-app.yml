name: Python Application CI

# Triggers the workflow on push or pull requests to the main branch
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: rocky-8.10

    steps:
    # Step 1: Check out the repository files to the runner
    - name: Checkout code
      uses: actions/checkout@v4

    # Step 2: Install Python environment
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    # Step 3: Install dependencies if a requirements file exists
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        if [ -f CFD-Automation-Suite-Source-Code/requirements.txt ]; then pip install -r CFD-Automation-Suite-Source-Code/requirements.txt; fi

    # Step 4: Run your tests or linting scripts
    - name: Run tests
      run: |
        # Replace this with your actual test command (e.g., pytest or python -m unittest)
        echo "Running automated suite validations..."
